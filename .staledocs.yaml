# staledocs — deterministic code<->docs drift detection.
version: 1
gate: strict

source:
  include:
    - "statusline.sh"
    - "scripts/**"
  exclude: []

# Every tracked .md is in scope: staledocs owns path/anchor liveness
# (docs-check.sh keeps only template-convention axes).
docs:
  include:
    - "*.md"
    - ".github/**/*.md"
  exclude: []

pairs:
  - doc: README.md
    code: ["statusline.sh", "scripts/**"]

mirror:
  enabled: false

standalone:
  - ROADMAP.md
  - CONTRIBUTING.md
  - SECURITY.md
  - THIRD_PARTY_NOTICES.md
  - ".github/**"

global:
  - README.ja.md

anchors:
  min_length: 3
  ignore:
    # sample output renderings, not identifiers
    - "5h:24%(3h22m)"
    - "7d:53%"
    - "ctx:███░░░░░35%"
  include_fenced: false
